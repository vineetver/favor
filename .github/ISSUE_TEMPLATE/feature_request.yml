name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: Describe the feature
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      placeholder: What are you trying to do?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search
        - Variant detail
        - Gene detail
        - Disease / Drug
        - Regulatory / Enrichment
        - Batch annotation
        - AI agent
        - Documentation
        - Performance
        - Other
